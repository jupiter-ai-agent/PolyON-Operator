<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PolyON Console — Menu Structure (IBM Cloud Style)</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'IBM Plex Sans', -apple-system, sans-serif;
  background: #f4f4f4;
  color: #161616;
  line-height: 1.5;
}

/* ── Header ── */
.header {
  background: #161616;
  color: #fff;
  padding: 16px 32px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header__logo { font-weight: 600; font-size: 16px; }
.header__logo span { color: #0f62fe; }
.header__title { font-size: 14px; color: #c6c6c6; }
.header__badge {
  margin-left: auto;
  background: #0f62fe;
  color: #fff;
  font-size: 12px;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 12px;
}

/* ── Layout Comparison ── */
.compare {
  display: grid;
  grid-template-columns: 240px 1fr;
  min-height: calc(100vh - 52px);
}

/* ── IBM-style Rail Nav (Left) ── */
.rail {
  background: #fff;
  border-right: 1px solid #e0e0e0;
  padding: 8px 0;
  position: sticky;
  top: 52px;
  height: calc(100vh - 52px);
  overflow-y: auto;
}
.rail__section {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.32px;
  color: #6f6f6f;
  padding: 16px 16px 4px;
  text-transform: uppercase;
  border-top: 1px solid #e0e0e0;
  margin-top: 4px;
}
.rail__section:first-child { border-top: none; margin-top: 0; }
.rail__item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  font-size: 13px;
  color: #161616;
  cursor: pointer;
  transition: background 0.1s;
  border-left: 3px solid transparent;
}
.rail__item:hover { background: #e8e8e8; }
.rail__item--active { background: #e0e0e0; border-left-color: #0f62fe; font-weight: 600; }
.rail__icon { width: 16px; height: 16px; flex-shrink: 0; }
.rail__count {
  margin-left: auto;
  font-size: 11px;
  color: #a8a8a8;
  font-family: 'IBM Plex Mono';
}

/* ── Main Content ── */
.main {
  padding: 24px 32px 64px;
  overflow-y: auto;
}

/* ── Stats ── */
.stats {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 1px;
  background: #e0e0e0;
  margin-bottom: 32px;
}
.stat-card {
  background: #fff;
  padding: 20px;
}
.stat-card__label { font-size: 11px; color: #525252; text-transform: uppercase; letter-spacing: 0.32px; }
.stat-card__value { font-size: 28px; font-weight: 600; margin-top: 4px; }
.stat-card__sub { font-size: 11px; color: #6f6f6f; margin-top: 2px; }

/* ── Depth Colors ── */
:root {
  --d-section: #161616;
  --d-category: #0f62fe;
  --d-menu: #0043ce;
  --d-group: #6929c4;
  --d-item: #1192e8;
}

/* ── Legend ── */
.legend {
  display: flex;
  gap: 20px;
  margin-bottom: 24px;
  padding: 12px 16px;
  background: #fff;
  border: 1px solid #e0e0e0;
  flex-wrap: wrap;
  align-items: center;
}
.legend__title { font-size: 12px; font-weight: 600; color: #525252; }
.legend__item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #525252; }
.legend__dot { width: 10px; height: 10px; border-radius: 2px; }
.legend__sep { width: 1px; height: 16px; background: #e0e0e0; }
.tag { font-size: 10px; padding: 1px 6px; border-radius: 2px; font-weight: 500; }
.tag--ok { background: #defbe6; color: #0e6027; }
.tag--part { background: #fdf6dd; color: #8e6a00; }
.tag--plan { background: #e8e8e8; color: #525252; }
.tag--engine { background: #e8daff; color: #6929c4; }

/* ── Section ── */
.sec {
  margin-bottom: 24px;
  scroll-margin-top: 60px;
}
.sec__head {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  background: var(--d-section);
  color: #fff;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.32px;
}
.sec__badge { background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 10px; font-size: 10px; }
.sec__grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
  gap: 1px;
  background: #e0e0e0;
}

/* ── Module Card ── */
.mod {
  background: #fff;
}
.mod__head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  border-left: 4px solid var(--d-category);
  background: #edf5ff;
}
.mod__title { font-size: 14px; font-weight: 600; color: var(--d-category); }
.mod__path { font-family: 'IBM Plex Mono'; font-size: 10px; color: #6f6f6f; margin-left: auto; }
.mod__desc { font-size: 11px; color: #525252; padding: 2px 16px 6px 20px; }

/* ── Items ── */
.items { padding: 2px 0 8px; }
.row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 16px 4px 20px;
  font-size: 12px;
}
.row:hover { background: #f4f4f4; }
.row--d2 { border-left: 3px solid var(--d-menu); padding-left: 17px; }
.row--d4 { padding-left: 8px; font-size: 11px; }
.dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.dot--d2 { background: var(--d-menu); }
.dot--d3 { background: var(--d-group); }
.dot--d4 { background: var(--d-item); }
.row__label { flex: 1; }
.row__path { font-family: 'IBM Plex Mono'; font-size: 9px; color: #a8a8a8; }

/* ── Group ── */
.grp {
  padding: 4px 16px 2px 36px;
  border-left: 3px solid var(--d-group);
  margin: 3px 16px 3px 20px;
  background: #f8f0ff;
}
.grp__title { font-size: 10px; font-weight: 600; color: var(--d-group); text-transform: uppercase; letter-spacing: 0.32px; margin-bottom: 1px; }

.divider { height: 1px; background: #e8e8e8; margin: 3px 16px 3px 20px; }

.footer {
  text-align: center;
  padding: 32px;
  font-size: 11px;
  color: #6f6f6f;
  border-top: 1px solid #e0e0e0;
  background: #fff;
}
</style>
</head>
<body>

<div class="header">
  <div class="header__logo">Triangle.s <span>PolyON</span></div>
  <div class="header__title">Console Menu Structure — IBM Cloud Style</div>
  <div style="display:flex;gap:0;margin-left:32px">
    <div style="padding:8px 20px;font-size:13px;color:#fff;border-bottom:2px solid #0f62fe;cursor:pointer">Menu Sitemap</div>
    <a href="diagram.html" style="padding:8px 20px;font-size:13px;color:#c6c6c6;text-decoration:none;border-bottom:2px solid transparent">Architecture Diagram</a>
  </div>
  <div class="header__badge" id="badge"></div>
</div>

<div class="compare">
  <nav class="rail" id="rail"></nav>
  <div class="main" id="main"></div>
</div>

<div class="footer">
  PolyON Console Menu Sitemap — IBM Cloud Style Reorganization · 2026-03-06 · Triangle.s

// ── Count ──
function count(data) {
  let t=0,ok=0,pt=0,pl=0,mods=0;
  data.forEach(s => s.modules.forEach(m => {
    mods++;
    (m.items||[]).forEach(i => {
      if (i.type==='group') (i.children||[]).forEach(c => { t++; if(c.status===S.OK)ok++; else if(c.status===S.PART)pt++; else pl++; });
      else { t++; if(i.status===S.OK)ok++; else if(i.status===S.PART)pt++; else pl++; }
    });
  }));
  return {t,ok,pt,pl,mods,secs:data.length};
}

function tag(s,eng) {
  let h='';
  if(eng) h+=`<span class="tag tag--engine">${eng}</span> `;
  if(s===S.OK) h+='<span class="tag tag--ok">✓</span>';
  else if(s===S.PART) h+='<span class="tag tag--part">△</span>';
  else h+='<span class="tag tag--plan">—</span>';
  return h;
}

const c = count(SITEMAP);
document.getElementById('badge').textContent=`${c.t} items · ${c.mods} modules · ${c.secs} sections`;

// ── Rail ──
let railHtml='';
SITEMAP.forEach((s,i)=>{
  const mc = s.modules.length;
  railHtml+=`<div class="rail__item${i===0?' rail__item--active':''}" onclick="document.getElementById('sec-${s.id}').scrollIntoView({behavior:'smooth'})">
    <span class="rail__icon">${s.icon}</span> ${s.section} <span class="rail__count">${mc}</span>
  </div>`;
});
document.getElementById('rail').innerHTML=railHtml;

// ── Main ──
let html=`
<div class="stats">
  <div class="stat-card"><div class="stat-card__label">Sections</div><div class="stat-card__value">${c.secs}</div><div class="stat-card__sub">IBM Cloud style grouping</div></div>
  <div class="stat-card"><div class="stat-card__label">Modules</div><div class="stat-card__value">${c.mods}</div><div class="stat-card__sub">1단 카테고리</div></div>
  <div class="stat-card"><div class="stat-card__label">구현 ✓</div><div class="stat-card__value" style="color:#0e6027">${c.ok}</div><div class="stat-card__sub">${(c.ok/c.t*100).toFixed(0)}%</div></div>
  <div class="stat-card"><div class="stat-card__label">부분 △</div><div class="stat-card__value" style="color:#8e6a00">${c.pt}</div><div class="stat-card__sub">${(c.pt/c.t*100).toFixed(0)}%</div></div>
  <div class="stat-card"><div class="stat-card__label">미구현 —</div><div class="stat-card__value" style="color:#525252">${c.pl}</div><div class="stat-card__sub">${(c.pl/c.t*100).toFixed(0)}%</div></div>
</div>
<div class="legend">
  <span class="legend__title">Depth:</span>
  <div class="legend__item"><div class="legend__dot" style="background:var(--d-section)"></div>Section</div>
  <div class="legend__item"><div class="legend__dot" style="background:var(--d-category)"></div>Category</div>
  <div class="legend__item"><div class="legend__dot" style="background:var(--d-menu)"></div>Menu</div>
  <div class="legend__item"><div class="legend__dot" style="background:var(--d-group)"></div>Group</div>
  <div class="legend__item"><div class="legend__dot" style="background:var(--d-item)"></div>Item</div>
  <div class="legend__sep"></div>
  <span class="tag tag--ok">✓ 구현</span>
  <span class="tag tag--part">△ 부분</span>
  <span class="tag tag--plan">— 미구현</span>
  <span class="tag tag--engine">Engine</span>
</div>`;

SITEMAP.forEach(s=>{
  const ic=s.modules.reduce((n,m)=>n+(m.items||[]).reduce((nn,i)=>nn+(i.type==='group'?(i.children||[]).length:1),0),0);
  html+=`<div class="sec" id="sec-${s.id}">
  <div class="sec__head">${s.icon} ${s.section} <span class="sec__badge">${s.modules.length} modules · ${ic} items</span></div>
  <div class="sec__grid">`;
  s.modules.forEach(m=>{
    html+=`<div class="mod"><div class="mod__head">
      <div class="mod__title">${m.title}</div>
      ${m.engine?`<span class="tag tag--engine">${m.engine}</span>`:''}
      <div class="mod__path">${m.path||''}</div>
      ${tag(m.status)}
    </div>`;
    if(m.desc) html+=`<div class="mod__desc">${m.desc}</div>`;
    if(m.items&&m.items.length){
      html+='<div class="items">';
      m.items.forEach(i=>{
        if(i.type==='group'){
          html+=`<div class="grp"><div class="grp__title">${i.label}</div>`;
          (i.children||[]).forEach(ch=>{
            html+=`<div class="row row--d4"><div class="dot dot--d4"></div><div class="row__label">${ch.label}</div><div class="row__path">${ch.path||''}</div>${tag(ch.status,ch.engine)}</div>`;
          });
          html+='</div>';
        } else {
          html+=`<div class="row row--d2"><div class="dot dot--d2"></div><div class="row__label">${i.label}</div><div class="row__path">${i.path||''}</div>${tag(i.status,i.engine)}</div>`;
        }
      });
      html+='</div>';
    }
    html+='</div>';
  });
  html+='</div></div>';
});

document.getElementById('main').innerHTML=html;
</script>
