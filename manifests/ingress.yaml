# ── Ingress: Console (oauth2-proxy as reverse proxy) ──
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: polyon-console-ingress
  namespace: {{.Namespace}}
  labels:
    app.kubernetes.io/part-of: polyon
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  tls:
    - hosts:
        - {{.ConsoleDomain}}
      secretName: polyon-tls
  rules:
    - host: {{.ConsoleDomain}}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: polyon-oauth2-proxy
                port:
                  number: 4180
---
# ── Ingress: Auth (Keycloak) ──
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: polyon-auth-ingress
  namespace: {{.Namespace}}
  labels:
    app.kubernetes.io/part-of: polyon
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  tls:
    - hosts:
        - {{.AuthDomain}}
      secretName: polyon-tls
  rules:
    - host: {{.AuthDomain}}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: polyon-auth
                port:
                  number: 8080
---
# ── Ingress: Portal ──
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: polyon-portal-ingress
  namespace: {{.Namespace}}
  labels:
    app.kubernetes.io/part-of: polyon
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  tls:
    - hosts:
        - {{.PortalDomain}}
      secretName: polyon-tls
  rules:
    - host: {{.PortalDomain}}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: polyon-portal
                port:
                  number: 80
