# ── Traefik ForwardAuth Middleware ──
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: polyon-auth-forward
  namespace: {{.Namespace}}
spec:
  forwardAuth:
    address: http://polyon-oauth2-proxy.{{.Namespace}}.svc.cluster.local:4180/oauth2/auth
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - X-Auth-Request-Access-Token
---
# ── Ingress: Console (with ForwardAuth) ──
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: polyon-console-ingress
  namespace: {{.Namespace}}
  labels:
    app.kubernetes.io/part-of: polyon
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: {{.Namespace}}-polyon-auth-forward@kubernetescrd
spec:
  tls:
    - hosts:
        - {{.ConsoleDomain}}
      secretName: polyon-tls
  rules:
    - host: {{.ConsoleDomain}}
      http:
        paths:
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: polyon-oauth2-proxy
                port:
                  number: 4180
          - path: /
            pathType: Prefix
            backend:
              service:
                name: polyon-console
                port:
                  number: 80
---
# ── Ingress: Auth (Keycloak) ──
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: polyon-auth-ingress
  namespace: {{.Namespace}}
  labels:
    app.kubernetes.io/part-of: polyon
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  tls:
    - hosts:
        - {{.AuthDomain}}
      secretName: polyon-tls
  rules:
    - host: {{.AuthDomain}}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: polyon-auth
                port:
                  number: 8080
---
# ── Ingress: Portal ──
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: polyon-portal-ingress
  namespace: {{.Namespace}}
  labels:
    app.kubernetes.io/part-of: polyon
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  tls:
    - hosts:
        - {{.PortalDomain}}
      secretName: polyon-tls
  rules:
    - host: {{.PortalDomain}}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: polyon-portal
                port:
                  number: 80
