# ── Ingress: Console (direct to Console nginx — SPA handles OIDC PKCE) ──
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: polyon-console-ingress
  namespace: {{.Namespace}}
  labels:
    app.kubernetes.io/part-of: polyon
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  tls:
    - hosts:
        - {{.ConsoleDomain}}
      secretName: polyon-tls
  rules:
    - host: {{.ConsoleDomain}}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: polyon-console
                port:
                  number: 80
---
# ── Ingress: Auth (Keycloak) ──
apiVersion: networking.k8s.io/v1
