# ── PolyON Common Secret ──
# 서비스별 독립 비밀번호 — Operator가 Setup 시 랜덤 생성
apiVersion: v1
kind: Secret
metadata:
  name: polyon-common-secret
  namespace: {{.Namespace}}
  labels:
    app.kubernetes.io/part-of: polyon
type: Opaque
stringData:
  # DC Admin (사용자 입력)
  POLYON_DC_ADMIN_PASSWORD: "{{.DCAdminPassword}}"
  ADMIN_PASSWORD: "{{.DCAdminPassword}}"

  # PostgreSQL
  POLYON_DB_PASSWORD: "{{.DBPassword}}"
  POLYON_DATABASE_URL: "postgres://polyon:{{.DBPassword}}@polyon-db:5432/polyon?sslmode=disable"
  DATABASE_URL: "postgres://polyon:{{.DBPassword}}@polyon-db:5432/polyon?sslmode=disable"

  # Keycloak Admin
  POLYON_KC_ADMIN_PASSWORD: "{{.KCAdminPassword}}"
  KC_ADMIN_PASSWORD: "{{.KCAdminPassword}}"

  # Stalwart Admin
  POLYON_STALWART_ADMIN_PASSWORD: "{{.StalwartAdminPassword}}"
  STALWART_ADMIN_PASSWORD: "{{.StalwartAdminPassword}}"

  # RustFS
  POLYON_RUSTFS_ACCESS_KEY: "polyon-admin"
  POLYON_RUSTFS_SECRET_KEY: "{{.RustFSSecretKey}}"
  RUSTFS_ROOT_USER: "polyon-admin"
  RUSTFS_ROOT_PASSWORD: "{{.RustFSSecretKey}}"

  # OpenSearch (security disabled — placeholder)
  POLYON_SEARCH_PASSWORD: ""

  # PostgreSQL superuser (for Keycloak, init scripts)
  POLYON_POSTGRES_PASSWORD: "{{.PostgresPassword}}"
