---
# ══════════════════════════════════════════════════════════════
# pgweb — PostgreSQL Web Query Manager
# ══════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: polyon-pgweb
  namespace: polyon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: polyon-pgweb
  template:
    metadata:
      labels:
        app: polyon-pgweb
    spec:
      containers:
        - name: pgweb
          image: sosedoff/pgweb:0.16.2
          args:
            - "--bind=0.0.0.0"
            - "--listen=8081"
            - "--prefix=/pgweb"
          env:
            - name: PGWEB_DATABASE_URL
              value: "postgres://{{.DBUser}}:{{.DBPassword}}@polyon-db:5432/polyon?sslmode=disable"
          ports:
            - containerPort: 8081
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: polyon-pgweb
  namespace: polyon
spec:
  selector:
    app: polyon-pgweb
  ports:
    - port: 8081
      targetPort: 8081
---
# ══════════════════════════════════════════════════════════════
# redis-commander — Redis Web Manager
# ══════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: polyon-redis-commander
  namespace: polyon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: polyon-redis-commander
  template:
    metadata:
      labels:
        app: polyon-redis-commander
    spec:
      containers:
        - name: redis-commander
          image: rediscommander/redis-commander:latest
          env:
            - name: REDIS_HOSTS
              value: "local:polyon-redis:6379"
            - name: URL_PREFIX
              value: "/redis"
            - name: PORT
              value: "8081"
          ports:
            - containerPort: 8081
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: polyon-redis-commander
  namespace: polyon
spec:
  selector:
    app: polyon-redis-commander
  ports:
    - port: 8081
      targetPort: 8081
---
# ══════════════════════════════════════════════════════════════
# elasticvue — Elasticsearch Web Manager
# ══════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: polyon-elasticvue
  namespace: polyon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: polyon-elasticvue
  template:
    metadata:
      labels:
        app: polyon-elasticvue
    spec:
      containers:
        - name: elasticvue
          image: cars10/elasticvue:1.1.0
          env:
            - name: ELASTICVUE_CLUSTERS
              value: '[{"name":"polyon","uri":"http://polyon-search:9200"}]'
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "32Mi"
              cpu: "30m"
            limits:
              memory: "64Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: polyon-elasticvue
  namespace: polyon
spec:
  selector:
    app: polyon-elasticvue
  ports:
    - port: 8080
      targetPort: 8080
