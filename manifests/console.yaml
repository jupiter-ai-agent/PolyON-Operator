# ── Console nginx ConfigMap ──
apiVersion: v1
kind: ConfigMap
metadata:
  name: polyon-console-nginx
  namespace: {{.Namespace}}
  labels:
    app: polyon-console
    app.kubernetes.io/part-of: polyon
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Core API backend
        location /api/ {
            proxy_pass http://polyon-core:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # Keycloak 26.x — no /auth prefix; strip /auth/ from upstream path
        location /auth/ {
            proxy_pass http://polyon-auth:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
            proxy_read_timeout 120s;
        }

        # Operator API
        location /operator/ {
            proxy_pass http://polyon-operator.polyon-operator.svc.cluster.local:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
---
# ── Console UI Service ──
apiVersion: v1
kind: Service
metadata:
  name: polyon-console
  namespace: {{.Namespace}}
  labels:
    app: polyon-console
    app.kubernetes.io/part-of: polyon
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: polyon-console
---
# ── Console UI Deployment ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: polyon-console
  namespace: {{.Namespace}}
  labels:
    app: polyon-console
    app.kubernetes.io/part-of: polyon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: polyon-console
  template:
    metadata:
      labels:
        app: polyon-console
    spec:
      containers:
        - name: console
          image: jupitertriangles/polyon-console:v1.0.0
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: polyon-console-nginx
