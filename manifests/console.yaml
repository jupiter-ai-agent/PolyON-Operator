# ── Console nginx ConfigMap ──
apiVersion: v1
kind: ConfigMap
metadata:
  name: polyon-console-nginx
  namespace: {{.Namespace}}
  labels:
    app: polyon-console
    app.kubernetes.io/part-of: polyon
data:
  default.conf: |
    server {
        listen 80;
        resolver 10.96.0.10 valid=10s ipv6=off;
        root /usr/share/nginx/html;
        index index.html;

        # ── SPA fallback ──
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # ── JS/CSS cache bust (exclude proxied paths) ──
        location ~* ^/(?!grafana/|pgweb/|redis/|elasticvue/|es-proxy/|strapi/|admin/).*\.(js|css)$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires 0;
        }

        # ── API proxy → polyon-core ──
        location /api/ {
            set $upstream_api http://polyon-core.{{.Namespace}}.svc.cluster.local:8000;
            proxy_pass $upstream_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
        }

        location /health {
            set $upstream_api http://polyon-core.{{.Namespace}}.svc.cluster.local:8000;
            proxy_pass $upstream_api;
        }

        # ── Operator API proxy (sentinel, setup, reset) ──
        location /api/sentinel/ {
            set $operator http://polyon-operator.polyon-operator.svc.cluster.local:80;
            proxy_pass $operator;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/setup/ {
            set $operator http://polyon-operator.polyon-operator.svc.cluster.local:80;
            proxy_pass $operator;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/reset/ {
            set $operator http://polyon-operator.polyon-operator.svc.cluster.local:80;
            proxy_pass $operator;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Keycloak Auth proxy ──
        location /auth/ {
            set $upstream_kc http://polyon-auth.{{.Namespace}}.svc.cluster.local:8080;
            proxy_pass $upstream_kc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }

        # ── Grafana proxy ──
        location /grafana/ {
            set $upstream_grafana http://polyon-grafana.{{.Namespace}}.svc.cluster.local:3000;
            proxy_pass $upstream_grafana;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_http_version 1.1;
        }

        # ── Stalwart Mail API proxy ──
        location /mail-proxy/ {
            set $upstream_api http://polyon-core.{{.Namespace}}.svc.cluster.local:8000;
            proxy_pass $upstream_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
        }

        # ── DB Tools proxy ──
        location /pgweb/ {
            set $pgweb http://polyon-pgweb.{{.Namespace}}.svc.cluster.local:8081;
            proxy_pass $pgweb;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_http_version 1.1;
        }

        location /redis/ {
            set $redis_cmd http://polyon-redis-commander.{{.Namespace}}.svc.cluster.local:8081;
            proxy_pass $redis_cmd;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_http_version 1.1;
        }

        location /elasticvue/ {
            set $elasticvue http://polyon-elasticvue.{{.Namespace}}.svc.cluster.local:8080;
            proxy_pass $elasticvue;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_http_version 1.1;
        }

        # ── ES proxy (Elasticvue → OpenSearch API) ──
        location /es-proxy/ {
            set $es http://polyon-search.{{.Namespace}}.svc.cluster.local:9200;
            proxy_pass $es;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
        }
    }
---
# ── Console UI Service ──
apiVersion: v1
kind: Service
metadata:
  name: polyon-console
  namespace: {{.Namespace}}
  labels:
    app: polyon-console
    app.kubernetes.io/part-of: polyon
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: polyon-console
---
# ── Console UI Deployment ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: polyon-console
  namespace: {{.Namespace}}
  labels:
    app: polyon-console
    app.kubernetes.io/part-of: polyon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: polyon-console
  template:
    metadata:
      labels:
        app: polyon-console
    spec:
      containers:
        - name: console
          image: jupitertriangles/polyon-console:v1.10.11
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: polyon-console-nginx
