# ── PolyON Core ServiceAccount ──
apiVersion: v1
kind: ServiceAccount
metadata:
  name: polyon-core
  namespace: {{.Namespace}}
  labels:
    app: polyon-core
    app.kubernetes.io/part-of: polyon
---
# ── PolyON Core Role ──
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: polyon-core
  namespace: {{.Namespace}}
  labels:
    app: polyon-core
    app.kubernetes.io/part-of: polyon
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
# ── PolyON Core RoleBinding ──
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: polyon-core
  namespace: {{.Namespace}}
  labels:
    app: polyon-core
    app.kubernetes.io/part-of: polyon
subjects:
  - kind: ServiceAccount
    name: polyon-core
    namespace: {{.Namespace}}
roleRef:
  kind: Role
  name: polyon-core
  apiGroup: rbac.authorization.k8s.io
---
# ── PolyON Core Backend Service ──
apiVersion: v1
kind: Service
metadata:
  name: polyon-core
  namespace: {{.Namespace}}
  labels:
    app: polyon-core
    app.kubernetes.io/part-of: polyon
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: polyon-core
---
# ── PolyON Core Backend Deployment ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: polyon-core
  namespace: {{.Namespace}}
  labels:
    app: polyon-core
    app.kubernetes.io/part-of: polyon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: polyon-core
  template:
    metadata:
      labels:
        app: polyon-core
    spec:
      serviceAccountName: polyon-core
      containers:
        - name: core
          image: jupitertriangles/polyon-core:v1.10.11
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: polyon-common-config
            - secretRef:
                name: polyon-common-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
