---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: polyon-appengine-data
  namespace: {{ .Namespace }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: polyon-appengine
  namespace: {{ .Namespace }}
  labels:
    app: polyon-appengine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: polyon-appengine
  template:
    metadata:
      labels:
        app: polyon-appengine
    spec:
      containers:
        - name: appengine
          image: jupitertriangles/polyon-appengine:{{ .AppEngineVersion }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8069
          envFrom:
            - secretRef:
                name: polyon-appengine-secret
          env:
            - name: ODOO_DB_FILTER
              value: "^polyon_erp$"
            - name: ODOO_LIST_DB
              value: "false"
            - name: ODOO_PROXY_MODE
              value: "true"
            - name: ODOO_WORKERS
              value: "2"
            - name: LDAP_HOST
              value: "polyon-dc"
            - name: LDAP_PORT
              value: "389"
            - name: LDAP_BASE_DN
              value: "{{.DomainDC}}"
            - name: LDAP_USERS_DN
              value: "CN=Users,{{.DomainDC}}"
            - name: LDAP_GROUPS_DN
              value: "{{.DomainDC}}"
            - name: LDAP_BIND_DN
              value: "Administrator@{{.Domain}}"
            - name: LDAP_BIND_PASSWORD
              value: "{{.AdminPassword}}"
          livenessProbe:
            httpGet:
              path: /web/health
              port: 8069
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /web/health
              port: 8069
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/odoo
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: polyon-appengine-data
---
apiVersion: v1
kind: Service
metadata:
  name: polyon-appengine
  namespace: {{ .Namespace }}
spec:
  selector:
    app: polyon-appengine
  ports:
    - port: 8069
      targetPort: 8069
