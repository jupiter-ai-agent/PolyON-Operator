# ── RustFS Secret ──
apiVersion: v1
kind: Secret
metadata:
  name: polyon-rustfs-secret
  namespace: {{.Namespace}}
  labels:
    app: polyon-rustfs
    app.kubernetes.io/part-of: polyon
type: Opaque
stringData:
  RUSTFS_ACCESS_KEY: "polyon-admin"
  RUSTFS_SECRET_KEY: "{{.RustFSSecretKey}}"
---
# ── RustFS Service ──
apiVersion: v1
kind: Service
metadata:
  name: polyon-rustfs
  namespace: {{.Namespace}}
  labels:
    app: polyon-rustfs
    app.kubernetes.io/part-of: polyon
spec:
  type: ClusterIP
  ports:
    - port: 9000
      targetPort: 9000
      protocol: TCP
      name: api
    - port: 9001
      targetPort: 9001
      protocol: TCP
      name: console
  selector:
    app: polyon-rustfs
---
# ── RustFS StatefulSet ──
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: polyon-rustfs
  namespace: {{.Namespace}}
  labels:
    app: polyon-rustfs
    app.kubernetes.io/part-of: polyon
spec:
  serviceName: polyon-rustfs
  replicas: 1
  selector:
    matchLabels:
      app: polyon-rustfs
  template:
    metadata:
      labels:
        app: polyon-rustfs
    spec:
      initContainers:
        - name: init-volume
          image: busybox:stable
          command: ["sh", "-c", "mkdir -p /data/vol1 && chown -R 10001:10001 /data"]
          volumeMounts:
            - name: rustfs-data
              mountPath: /data
      containers:
        - name: rustfs
          image: rustfs/rustfs:1.0.0-alpha.85
          env:
            - name: RUSTFS_VOLUMES
              value: "/data/vol1"
            - name: RUSTFS_ADDRESS
              value: ":9000"
          envFrom:
            - secretRef:
                name: polyon-rustfs-secret
          args: ["--console-address", ":9001", "/data/vol1"]
          ports:
            - containerPort: 9000
            - containerPort: 9001
          readinessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 1Gi
              cpu: 500m
          volumeMounts:
            - name: rustfs-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: rustfs-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
