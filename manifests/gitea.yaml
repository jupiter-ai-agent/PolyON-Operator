---
apiVersion: v1
kind: ConfigMap
metadata:
  name: polyon-gitea-ini
  namespace: {{ .Namespace }}
data:
  app.ini: |
    APP_NAME = PolyON Git
    RUN_MODE = prod
    
    [database]
    DB_TYPE  = postgres
    HOST     = polyon-db:5432
    NAME     = polyon_gitea
    USER     = polyon
    PASSWD   = {{ .DBPassword }}
    SSL_MODE = disable
    
    [server]
    DOMAIN           = git.{{ .Domain }}
    ROOT_URL         = https://git.{{ .Domain }}
    HTTP_PORT        = 3000
    DISABLE_SSH      = true
    LFS_START_SERVER = false
    
    [service]
    DISABLE_REGISTRATION              = true
    ALLOW_ONLY_INTERNAL_REGISTRATION  = true
    DEFAULT_ALLOW_CREATE_ORGANIZATION = false
    REQUIRE_SIGNIN_VIEW               = true
    
    [openid]
    ENABLE_OPENID_SIGNIN = false
    ENABLE_OPENID_SIGNUP = false
    
    [security]
    INSTALL_LOCK = true
    
    [log]
    MODE      = console
    LEVEL     = info
    
    [admin]
    DISABLE_REGULAR_ORG_CREATION = true
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: polyon-gitea-data
  namespace: {{ .Namespace }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: polyon-gitea
  namespace: {{ .Namespace }}
  labels:
    app: polyon-gitea
spec:
  replicas: 1
  selector:
    matchLabels:
      app: polyon-gitea
  template:
    metadata:
      labels:
        app: polyon-gitea
    spec:
      initContainers:
        - name: init-config
          image: busybox:1.37
          command: ['sh', '-c', 'mkdir -p /data/gitea/conf && cp /config/app.ini /data/gitea/conf/app.ini && chown -R 1000:1000 /data/gitea']
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /config
      containers:
        - name: gitea
          image: gitea/gitea:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: GITEA_WORK_DIR
              value: /data
            - name: GITEA__database__DB_TYPE
              value: postgres
            - name: GITEA__database__HOST
              value: polyon-db:5432
            - name: GITEA__database__NAME
              value: polyon_gitea
            - name: GITEA__database__USER
              value: polyon
            - name: GITEA__database__PASSWD
              value: "{{ .DBPassword }}"
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: polyon-gitea-data
        - name: config
          configMap:
            name: polyon-gitea-ini
---
apiVersion: v1
kind: Service
metadata:
  name: polyon-gitea
  namespace: {{ .Namespace }}
spec:
  selector:
    app: polyon-gitea
  ports:
    - port: 3000
      targetPort: 3000
