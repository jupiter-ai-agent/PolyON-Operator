# ── Samba AD DC Secret ──
apiVersion: v1
kind: Secret
metadata:
  name: polyon-dc-secret
  namespace: {{.Namespace}}
  labels:
    app: polyon-dc
    app.kubernetes.io/part-of: polyon
type: Opaque
stringData:
  SAMBA_ADMIN_PASSWORD: "{{.DCAdminPassword}}"
---
# ── Samba AD DC Service ──
apiVersion: v1
kind: Service
metadata:
  name: polyon-dc
  namespace: {{.Namespace}}
  labels:
    app: polyon-dc
    app.kubernetes.io/part-of: polyon
spec:
  type: ClusterIP
  ports:
    - port: 389
      targetPort: 389
      protocol: TCP
      name: ldap
    - port: 636
      targetPort: 636
      protocol: TCP
      name: ldaps
    - port: 53
      targetPort: 53
      protocol: TCP
      name: dns-tcp
    - port: 53
      targetPort: 53
      protocol: UDP
      name: dns-udp
    - port: 88
      targetPort: 88
      protocol: TCP
      name: kerberos
    - port: 445
      targetPort: 445
      protocol: TCP
      name: smb
  selector:
    app: polyon-dc
---
# ── Samba AD DC StatefulSet ──
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: polyon-dc
  namespace: {{.Namespace}}
  labels:
    app: polyon-dc
    app.kubernetes.io/part-of: polyon
spec:
  serviceName: polyon-dc
  replicas: 1
  selector:
    matchLabels:
      app: polyon-dc
  template:
    metadata:
      labels:
        app: polyon-dc
    spec:
      hostname: dc1
      containers:
        - name: samba-dc
          image: jupitertriangles/polyon-dc:v1.0.0
          securityContext:
            privileged: true
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              PROVISIONED="/var/lib/samba/.provisioned"
              if [ ! -f "$PROVISIONED" ]; then
                echo "[PolyON] Provisioning Samba AD DC: realm={{.DomainUpper}} domain={{.DomainNetBIOS}}"
                rm -rf /etc/samba/smb.conf
                samba-tool domain provision \
                  --host-name="dc1" \
                  --realm="{{.DomainUpper}}" \
                  --domain="{{.DomainNetBIOS}}" \
                  --adminpass="{{.DCAdminPassword}}" \
                  --server-role=dc \
                  --dns-backend=SAMBA_INTERNAL \
                  --use-rfc2307
                touch "$PROVISIONED"
                echo "[PolyON] Samba AD DC provisioned successfully"
              else
                echo "[PolyON] Samba AD DC already provisioned, starting..."
              fi
              # Allow plain LDAP bind for Keycloak/Stalwart federation
              sed -i '/\[global\]/a\\tldap server require strong auth = no' /var/lib/samba/private/smb.conf 2>/dev/null || sed -i '/\[global\]/a\\tldap server require strong auth = no' /etc/samba/smb.conf
              exec samba -F --no-process-group
          env:
            - name: SAMBA_REALM
              value: "{{.DomainUpper}}"
            - name: SAMBA_DOMAIN
              value: "{{.DomainNetBIOS}}"
            - name: SAMBA_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: polyon-dc-secret
                  key: SAMBA_ADMIN_PASSWORD
            - name: SAMBA_HOST
              value: "polyon-dc"
          ports:
            - containerPort: 389
            - containerPort: 636
            - containerPort: 53
              protocol: TCP
            - containerPort: 53
              protocol: UDP
            - containerPort: 88
            - containerPort: 445
          readinessProbe:
            tcpSocket:
              port: 389
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              memory: 512Mi
              cpu: 200m
            limits:
              memory: 1Gi
              cpu: 500m
          volumeMounts:
            - name: samba-data
              mountPath: /var/lib/samba
            - name: samba-conf
              mountPath: /etc/samba/external
  volumeClaimTemplates:
    - metadata:
        name: samba-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
    - metadata:
        name: samba-conf
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 100Mi
