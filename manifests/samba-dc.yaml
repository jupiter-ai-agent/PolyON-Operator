# ── Samba AD DC Secret ──
apiVersion: v1
kind: Secret
metadata:
  name: polyon-dc-secret
  namespace: {{.Namespace}}
  labels:
    app: polyon-dc
    app.kubernetes.io/part-of: polyon
type: Opaque
stringData:
  SAMBA_ADMIN_PASSWORD: "{{.DCAdminPassword}}"
---
# ── Samba AD DC Service ──
apiVersion: v1
kind: Service
metadata:
  name: polyon-dc
  namespace: {{.Namespace}}
  labels:
    app: polyon-dc
    app.kubernetes.io/part-of: polyon
spec:
  type: ClusterIP
  ports:
    - port: 389
      targetPort: 389
      protocol: TCP
      name: ldap
    - port: 636
      targetPort: 636
      protocol: TCP
      name: ldaps
    - port: 53
      targetPort: 53
      protocol: TCP
      name: dns-tcp
    - port: 53
      targetPort: 53
      protocol: UDP
      name: dns-udp
    - port: 88
      targetPort: 88
      protocol: TCP
      name: kerberos
    - port: 445
      targetPort: 445
      protocol: TCP
      name: smb
  selector:
    app: polyon-dc
---
# ── Samba AD DC StatefulSet ──
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: polyon-dc
  namespace: {{.Namespace}}
  labels:
    app: polyon-dc
    app.kubernetes.io/part-of: polyon
spec:
  serviceName: polyon-dc
  replicas: 1
  selector:
    matchLabels:
      app: polyon-dc
  template:
    metadata:
      labels:
        app: polyon-dc
    spec:
      hostname: dc1
      containers:
        - name: samba-dc
          image: jupitertriangles/polyon-dc:{{ .DCVersion }}
          securityContext:
            privileged: true
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              PROVISIONED="/var/lib/samba/.provisioned"
              SMB_CONF="/etc/samba/smb.conf"
              SMB_BACKUP="/var/lib/samba/.smb.conf.bak"

              if [ ! -f "$PROVISIONED" ]; then
                echo "[PolyON] Provisioning Samba AD DC: realm={{.DomainUpper}} domain={{.DomainNetBIOS}}"
                rm -f "$SMB_CONF"
                samba-tool domain provision \
                  --host-name="dc1" \
                  --realm="{{.DomainUpper}}" \
                  --domain="{{.DomainNetBIOS}}" \
                  --adminpass="{{.DCAdminPassword}}" \
                  --server-role=dc \
                  --dns-backend=SAMBA_INTERNAL \
                  --use-rfc2307
                # Allow plain LDAP bind for Keycloak/Stalwart
                if grep -q '\[global\]' "$SMB_CONF" 2>/dev/null; then
                  sed -i '/\[global\]/a\\tldap server require strong auth = no' "$SMB_CONF"
                fi
                # Backup smb.conf to PVC (survives restart)
                cp "$SMB_CONF" "$SMB_BACKUP"
                cp /etc/krb5.conf /var/lib/samba/.krb5.conf.bak 2>/dev/null || true
                touch "$PROVISIONED"
                echo "[PolyON] Samba AD DC provisioned successfully"
              else
                echo "[PolyON] Samba AD DC already provisioned, restoring config..."
                # Restore smb.conf from PVC backup
                if [ -f "$SMB_BACKUP" ]; then
                  cp "$SMB_BACKUP" "$SMB_CONF"
                  echo "[PolyON] smb.conf restored from PVC backup"
                fi
                if [ -f "/var/lib/samba/.krb5.conf.bak" ]; then
                  cp /var/lib/samba/.krb5.conf.bak /etc/krb5.conf
                fi
              fi

              echo "[PolyON] Starting Samba AD DC..."
              exec samba -F --no-process-group
          env:
            - name: SAMBA_REALM
              value: "{{.DomainUpper}}"
            - name: SAMBA_DOMAIN
              value: "{{.DomainNetBIOS}}"
            - name: SAMBA_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: polyon-dc-secret
                  key: SAMBA_ADMIN_PASSWORD
            - name: SAMBA_HOST
              value: "polyon-dc"
          ports:
            - containerPort: 389
            - containerPort: 636
            - containerPort: 53
              protocol: TCP
            - containerPort: 53
              protocol: UDP
            - containerPort: 88
            - containerPort: 445
          readinessProbe:
            tcpSocket:
              port: 389
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            exec:
              command: ["samba-tool", "processes", "--name=ldap_server"]
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: 512Mi
              cpu: 200m
            limits:
              memory: 1Gi
              cpu: 500m
          volumeMounts:
            - name: samba-data
              mountPath: /var/lib/samba
            - name: samba-conf
              mountPath: /etc/samba/external
  volumeClaimTemplates:
    - metadata:
        name: samba-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
    - metadata:
        name: samba-conf
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 100Mi
