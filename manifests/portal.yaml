# ── PolyON Portal Service ──
apiVersion: v1
kind: Service
metadata:
  name: polyon-portal
  namespace: {{.Namespace}}
  labels:
    app: polyon-portal
    app.kubernetes.io/part-of: polyon
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: polyon-portal
---
# ── PolyON Portal Deployment ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: polyon-portal
  namespace: {{.Namespace}}
  labels:
    app: polyon-portal
    app.kubernetes.io/part-of: polyon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: polyon-portal
  template:
    metadata:
      labels:
        app: polyon-portal
    spec:
      containers:
        - name: portal
          image: jupitertriangles/polyon-portal:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: 32Mi
              cpu: 50m
            limits:
              memory: 64Mi
              cpu: 100m
