---
apiVersion: v1
kind: ConfigMap
metadata:
  name: polyon-ai-config
  namespace: {{ .Namespace }}
data:
  litellm-config.yaml: |
    model_list: []
    
    general_settings:
      master_key: "{{ .LiteLLMMasterKey }}"
      database_url: "postgresql://polyon:{{ .DBPassword }}@polyon-db:5432/polyon_ai"
      store_model_in_db: true
      
    litellm_settings:
      drop_params: true
      set_verbose: false
      cache: true
      cache_params:
        type: "redis"
        host: "polyon-redis"
        port: 6379
        db: 2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: polyon-ai
  namespace: {{ .Namespace }}
  labels:
    app: polyon-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: polyon-ai
  template:
    metadata:
      labels:
        app: polyon-ai
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          args:
            - "--config"
            - "/app/config/litellm-config.yaml"
            - "--port"
            - "4000"
          env:
            - name: DATABASE_URL
              value: "postgresql://polyon:{{ .DBPassword }}@polyon-db:5432/polyon_ai"
            - name: REDIS_HOST
              value: "polyon-redis"
            - name: REDIS_PORT
              value: "6379"
            - name: LITELLM_MASTER_KEY
              value: "{{ .LiteLLMMasterKey }}"
          volumeMounts:
            - name: config
              mountPath: /app/config
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: 1Gi
              cpu: 100m
            limits:
              memory: 2Gi
      volumes:
        - name: config
          configMap:
            name: polyon-ai-config
---
apiVersion: v1
kind: Service
metadata:
  name: polyon-ai
  namespace: {{ .Namespace }}
spec:
  selector:
    app: polyon-ai
  ports:
    - port: 4000
      targetPort: 4000
